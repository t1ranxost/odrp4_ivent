<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UnionTeam | Ивент-отдел — таблицы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard">
    <div class="top-bar">
        <div class="logo-area">
            <h1>UnionTeam · Ивент отдел Обычный Дарк РП 4</h1>
            <span>Ивент-отдел | Ивенты, участники и самое нужное</span>
        </div>
        <div class="user-actions">
            <div class="clock-wrapper">
                <span class="clock-badge" id="liveClockEvent">--:--:--</span>
            </div>
            <button class="theme-toggle" id="themeToggleBtn" aria-label="Переключить тему">
                🌞
            </button>
            <button class="logout-btn" id="logoutEventBtn"><i class="fas fa-sign-out-alt"></i>Перезагрузить</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="nav-section">
                <div class="nav-title">ГЛАВНОЕ</div>
                <div class="nav-item active" data-tab="events_table">
                    <i class="fas fa-table"></i> <span>Таблица ивентов</span>
                </div>
                <div class="nav-item" data-tab="team_table">
                    <i class="fas fa-users"></i> <span>Команда ивента</span>
                </div>
                <div class="nav-item" data-tab="new_event">
                    <i class="fas fa-pl us-circle"></i> <span>Новый ивент</span>
                </div>
            </div>
            <div class="nav-section">
                <div class="nav-title">ПРОЧЕЕ</div>
                <div class="nav-item" data-tab="event_guide">
                    <i class="fas fa-book"></i> <span>Методичка</span>
                </div>
            </div>
        </div>

        <div class="content-area" id="eventDynamicContent"></div>
    </div>
    <footer>UnionTeam · Ивент-менеджмент — нажмите на строку для деталей</footer>
</div>

<!-- Модальное окно -->
<div id="infoModal" class="modal">
    <div class="modal-card">
        <div class="modal-header">
            <span id="modalTitle"><i class="fas fa-info-circle"></i> Детали</span>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
